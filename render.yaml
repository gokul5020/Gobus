# Render Blueprint for GoBus — deploys the FastAPI backend (web service) and
# the Vite frontend (static site). MongoDB is your existing Atlas cluster.
#
# Usage: Render Dashboard -> New -> Blueprint -> connect this repo.
# Then fill the secret env vars marked "sync: false" (MONGO_URI, JWT_SECRET,
# SMTP_USER, SMTP_PASS, SMTP_FROM). If Render appends a suffix to a service
# name, update the URL env vars below to match the actual service URLs.

services:
  # ── Backend: FastAPI + Socket.IO ──────────────────────────────────────────
  - type: web
    name: gobus-backend
    runtime: python
    rootDir: backend_python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:sio_app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: "7d"
      - key: OTP_EXPIRY_MINUTES
        value: "5"
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_FROM_NAME
        value: SmartBus
      - key: FRONTEND_URL
        value: https://gobus-frontend.onrender.com

  # ── Frontend: Vite static site ────────────────────────────────────────────
  - type: web
    name: gobus-frontend
    runtime: static
    rootDir: .
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://gobus-backend.onrender.com/api
      - key: VITE_SOCKET_URL
        value: https://gobus-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
