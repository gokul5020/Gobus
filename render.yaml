# Render Blueprint for GoBus — SINGLE service.
# A Docker image builds the Vite frontend and serves it from the FastAPI
# backend, so the whole app (React UI + /api + socket.io) lives behind ONE URL.
# MongoDB is your existing Atlas cluster.
#
# Usage: Render Dashboard -> Blueprints -> this repo -> Manual Sync.
# Then fill the secret env vars marked "sync: false".

services:
  - type: web
    name: gobus
    runtime: docker
    rootDir: .
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: "7d"
      - key: OTP_EXPIRY_MINUTES
        value: "5"
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_FROM_NAME
        value: SmartBus
